apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: gitops-b
  labels:
    app: cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
        - name: cart
          image: nginx:1.25
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: gitops-b
spec:
  selector: { app: cart }
  ports:
    - port: 80